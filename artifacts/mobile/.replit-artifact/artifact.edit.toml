kind = "mobile"
previewPath = "/mobile"
title = "Buccaneer Wallet"
version = "1.0.0"
id = "artifacts/mobile"

[[services]]
localPort = 18115
name = "expo"
paths = ["/mobile"]

[services.env]
PORT = "18115"
BASE_PATH = "/mobile"

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

[services.production]
build = "pnpm --filter @workspace/mobile run build"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/mobile", "run", "serve"]

[services.production.run.env]
PORT = "18115"
BASE_PATH = "/mobile"
