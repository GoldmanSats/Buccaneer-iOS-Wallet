<!DOCTYPE html>

<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Pirata+One&family=Nunito:wght@400;600;700;800&family=Chewy&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1242px; height: 2688px;
  background: #0B1426;
  font-family: 'Nunito', sans-serif;
  color: #FFFFFF;
  overflow: hidden;
  position: relative;
}
.status-bar { height: 132px; display: flex; align-items: center; justify-content: space-between; padding: 40px 80px 0; font-size: 42px; font-weight: 700; }
.header { display: flex; align-items: center; justify-content: center; padding: 50px 80px; position: relative; }
.header-title { font-family: 'Pirata One', cursive; font-size: 72px; color: #C9A24D; }
.back-btn { position: absolute; left: 80px; font-size: 60px; color: #C9A24D; }
.qr-section { display: flex; flex-direction: column; align-items: center; padding: 80px; }
.qr-container { background: #FFFFFF; border-radius: 50px; padding: 60px; margin-bottom: 60px; box-shadow: 0 0 80px rgba(23,162,184,0.2); }
.qr-grid { width: 560px; height: 560px; display: grid; grid-template-columns: repeat(21, 1fr); grid-template-rows: repeat(21, 1fr); gap: 1px; }
.qr-cell { background: #0B1426; border-radius: 2px; }
.qr-cell-w { background: #FFFFFF; }
.qr-label { font-size: 42px; color: #8FA3C8; margin-bottom: 30px; }
.amount-display { text-align: center; margin-bottom: 60px; }
.amount-value { font-family: 'Chewy', cursive; font-size: 100px; color: #17A2B8; }
.amount-unit { font-size: 48px; color: #8FA3C8; }
.address-card { background: #151F35; border: 3px solid #1E2D50; border-radius: 40px; padding: 44px 50px; width: 100%; margin: 40px 80px; display: flex; align-items: center; justify-content: space-between; }
.address-section { margin: 0 80px; width: calc(100% - 160px); }
.address-label { font-size: 36px; color: #8FA3C8; margin-bottom: 16px; }
.address-value { font-size: 38px; color: #C9A24D; font-family: monospace; word-break: break-all; }
.copy-btn { background: rgba(201,162,77,0.15); border: 2px solid rgba(201,162,77,0.3); color: #C9A24D; padding: 20px 40px; border-radius: 30px; font-size: 36px; font-weight: 700; margin-left: 20px; white-space: nowrap; }
.share-section { display: flex; gap: 40px; padding: 60px 80px; width: 100%; }
.share-btn { flex: 1; background: rgba(23,162,184,0.15); border: 3px solid rgba(23,162,184,0.3); border-radius: 50px; padding: 44px; text-align: center; font-size: 42px; font-weight: 700; color: #17A2B8; }
.share-btn-gold { background: linear-gradient(135deg, #C9A24D 0%, #a07c35 100%); color: #0B1426; border: none; box-shadow: 0 8px 40px rgba(201,162,77,0.3); }
.ln-badge { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 40px 0; }
.ln-icon { font-size: 48px; }
.ln-text { font-size: 40px; color: #C9A24D; font-weight: 700; }
</style>
</head>
